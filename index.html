<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Trip 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f7ff;
  --ink: #0a1628;
  --c1: #0e6ba8;
  --c2: #1e90d4;
  --c3: #7ec8e3;
  --text: #0a1628;
  --muted: rgba(10,22,40,0.45);
  --card: rgba(14,107,168,0.05);
  --border: rgba(14,107,168,0.14);
  --orb1: #7ec8e3;
  --orb2: #b8dff0;
  --orb3: #d4eef9;
  --header-bg: rgba(240,247,255,0.9);
  --transition: 0.7s cubic-bezier(0.16,1,0.3,1);
}

/* ── MYKONOS — Aegean Blue & Whitewash ── */
body.theme-mykonos {
  --bg: #eef6ff;
  --ink: #0a1e3d;
  --c1: #0d5fa3;
  --c2: #1a8fd1;
  --c3: #6ec6e8;
  --muted: rgba(10,30,61,0.45);
  --card: rgba(13,95,163,0.05);
  --border: rgba(13,95,163,0.13);
  --orb1: #6ec6e8;
  --orb2: #aaddf4;
  --orb3: #ceedfb;
  --header-bg: rgba(238,246,255,0.92);
}

/* ── MALLORCA — Mediterranean Gold & Terra ── */
body.theme-mallorca {
  --bg: #fff8ee;
  --ink: #2d1a00;
  --c1: #c26a00;
  --c2: #e8890a;
  --c3: #f5b84a;
  --muted: rgba(45,26,0,0.45);
  --card: rgba(194,106,0,0.05);
  --border: rgba(194,106,0,0.14);
  --orb1: #f5b84a;
  --orb2: #fad48a;
  --orb3: #fde9b8;
  --header-bg: rgba(255,248,238,0.92);
}

/* ── PARIS — Bleu de France & Rose Gold ── */
body.theme-paris {
  --bg: #f2f0f8;
  --ink: #120d2a;
  --c1: #3d2fa0;
  --c2: #6254c8;
  --c3: #c49fbf;
  --muted: rgba(18,13,42,0.45);
  --card: rgba(61,47,160,0.05);
  --border: rgba(61,47,160,0.13);
  --orb1: #b8a8e8;
  --orb2: #d4c8f5;
  --orb3: #e8d8ee;
  --header-bg: rgba(242,240,248,0.92);
}

/* ── OVERVIEW — Warm neutral ── */
body.theme-overview, body.theme-stats, body.theme-assistant {
  --bg: #f8f6f2;
  --ink: #1a1612;
  --c1: #5c4a2a;
  --c2: #8c6e3c;
  --c3: #c9a96e;
  --muted: rgba(26,22,18,0.45);
  --card: rgba(92,74,42,0.05);
  --border: rgba(92,74,42,0.13);
  --orb1: #d4b87a;
  --orb2: #e8d4a8;
  --orb3: #f2e8d0;
  --header-bg: rgba(248,246,242,0.92);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'EB Garamond', serif;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: none;
  transition: background var(--transition), color var(--transition);
}

/* ── CUSTOM CURSOR ── */
.cursor {
  position: fixed;
  width: 8px; height: 8px;
  background: var(--c1);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%,-50%);
  transition: background 0.4s, transform 0.15s;
}
.cursor-ring {
  position: fixed;
  width: 32px; height: 32px;
  border: 1.5px solid var(--c2);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%,-50%);
  transition: border-color 0.4s, width 0.4s, height 0.4s;
  opacity: 0.5;
}

/* ── CITY BACKGROUND IMAGES ── */
.city-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1.2s ease;
  background-size: cover;
  background-position: center;
}
.city-bg.active { opacity: 0.18; }
.city-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg,
    var(--bg) 0%,
    rgba(0,0,0,0) 30%,
    rgba(0,0,0,0) 70%,
    var(--bg) 100%);
}

#bg-mykonos  { background-image: url('https://images.unsplash.com/photo-1601581875309-fafbf2d3ed3a?w=2400&q=80'); }
#bg-mallorca { background-image: url('https://images.unsplash.com/photo-1583309217394-d216bbcd8462?w=2400&q=80'); }
#bg-paris    { background-image: url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=2400&q=80'); }
#bg-overview { background-image: url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=2400&q=80'); }

/* ── CITY BACKGROUND IMAGES ── */
.city-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1.4s ease;
  background-size: cover;
  background-position: center;
}
.city-bg.active { opacity: 0.22; }
.city-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg,
    var(--bg) 0%,
    rgba(255,255,255,0) 25%,
    rgba(255,255,255,0) 75%,
    var(--bg) 100%);
}

/* Mykonos — Aerial whitewashed town meets Aegean blue */
#bg-mykonos { background-image: url('https://images.unsplash.com/photo-1718891085463-28546b1789ab?fm=jpg&q=80&w=2400&auto=format&fit=crop'); }
/* Mallorca — Boat in turquoise lagoon, summer holiday energy */
#bg-mallorca { background-image: url('https://images.unsplash.com/photo-1617532408070-369f42b448b0?fm=jpg&q=80&w=2400&auto=format&fit=crop'); }
/* Paris — Eiffel Tower at golden hour */
#bg-paris { background-image: url('https://images.unsplash.com/photo-1679231926690-cb1e8abfcefd?fm=jpg&q=80&w=2400&auto=format&fit=crop'); }
/* Overview — Wanderlust travel collage */
#bg-overview { background-image: url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=2400&q=80&auto=format&fit=crop'); }
/* Stats — Friends at the beach, sunset, fun young energy */
#bg-stats { background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=2400&q=80&auto=format&fit=crop'); }

/* ── ANIMATED BACKGROUND ── */
.bg-orbs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.3;
  transition: background var(--transition), transform 2s ease;
}
.orb1 { width: 700px; height: 700px; top: -150px; right: -150px; background: var(--orb1); animation: orb-float1 14s ease-in-out infinite; }
.orb2 { width: 600px; height: 600px; bottom: -100px; left: -100px; background: var(--orb2); animation: orb-float2 17s ease-in-out infinite; }
.orb3 { width: 400px; height: 400px; top: 40%; left: 35%; background: var(--orb3); animation: orb-float3 11s ease-in-out infinite; }

@keyframes orb-float1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-30px,40px) scale(1.1)} }
@keyframes orb-float2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(40px,-30px) scale(0.9)} }
@keyframes orb-float3 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(20px,30px) scale(1.05)} 66%{transform:translate(-20px,-10px) scale(0.95)} }

/* ── NOISE TEXTURE ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
  z-index: 1;
}

/* ── LAYOUT ── */
.app { position: relative; z-index: 2; min-height: 100vh; }

/* ── HEADER ── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 48px;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--header-bg);
}
.logo {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--ink);
  transition: color var(--transition);
}
.logo span { color: var(--muted); }
.header-trip {
  font-family: 'EB Garamond', serif;
  font-size: 15px;
  font-style: italic;
  color: var(--muted);
}
.header-right {
  display: flex;
  align-items: center;
  gap: 24px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}
.live-dot {
  display: inline-block;
  width: 5px; height: 5px;
  background: #2d9e5f;
  border-radius: 50%;
  margin-right: 6px;
  animation: pulse 2s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

/* ── CITY NAV ── */
.city-nav {
  display: flex;
  gap: 0;
  padding: 0 48px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.city-nav::-webkit-scrollbar { display: none; }
.city-btn {
  position: relative;
  padding: 20px 28px;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  background: none;
  border: none;
  cursor: none;
  white-space: nowrap;
  transition: color 0.3s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.city-btn:hover { color: var(--ink); }
.city-btn.active { color: var(--ink); }
.city-btn.active::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--c1), var(--c2));
}
.city-flag { font-size: 16px; }
.city-days {
  font-family: 'Syne Mono', monospace;
  font-size: 10px;
  padding: 2px 6px;
  background: var(--border);
  border-radius: 4px;
  color: var(--muted);
}
.city-btn.active .city-days {
  background: linear-gradient(135deg, var(--c1), var(--c2));
  color: var(--bg);
}

/* ── MAIN CONTENT ── */
.content { padding: 0 48px 60px; }

/* ── HERO CITY SECTION ── */
.city-hero {
  padding: 52px 0 40px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 40px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 40px;
}
.city-hero-left {}
.city-eyebrow {
  font-family: 'Syne Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--c1);
  margin-bottom: 12px;
  transition: color var(--transition);
  display: flex;
  align-items: center;
  gap: 8px;
}
.city-eyebrow::before { content: ''; display: inline-block; width: 24px; height: 1px; background: var(--c1); transition: background var(--transition); }
.city-name-big {
  font-family: 'Playfair Display', serif;
  font-size: clamp(52px, 8vw, 96px);
  font-weight: 700;
  line-height: 0.9;
  background: linear-gradient(135deg, var(--c1) 0%, var(--c2) 50%, var(--c3) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  transition: background var(--transition);
  margin-bottom: 12px;
}
.city-tagline {
  font-size: 15px;
  color: var(--muted);
  font-style: italic;
  font-family: 'Playfair Display', serif;
}
.city-hero-right { text-align: right; }
.city-dates {
  font-family: 'Syne Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
}
.city-total-cost {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  font-weight: 700;
  line-height: 1;
  color: var(--ink);
}
.city-total-cost span { font-size: 22px; color: var(--muted); }

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2px;
  margin-bottom: 32px;
  background: var(--border);
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  border-radius: 4px;
  overflow: hidden;
}
.stat-box {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 24px 28px;
  position: relative;
  overflow: hidden;
}
.stat-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--c1), var(--c2));
  opacity: 0;
  transition: opacity 0.3s;
}
.stat-box:hover::before { opacity: 1; }
.stat-label {
  font-family: 'Syne Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.stat-val {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
  background: linear-gradient(135deg, var(--c1), var(--c2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  transition: background var(--transition);
}
.stat-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
}

/* ── DETAILS GRID ── */
.details-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 32px;
}
.detail-card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 28px;
  transition: border-color 0.3s, background 0.3s, transform 0.3s;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}
.detail-card:hover {
  border-color: var(--c2);
  background: rgba(255,255,255,0.92);
  transform: translateY(-2px);
}
.dc-title {
  font-family: 'Syne Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--c1);
  margin-bottom: 20px;
  transition: color var(--transition);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.dc-icon { font-size: 16px; }

/* ── HOTEL CARD ── */
.hotel-info { display: flex; flex-direction: column; gap: 10px; }
.hotel-name-big {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  line-height: 1.2;
}
.hotel-stars { color: #fbbf24; font-size: 13px; letter-spacing: 2px; }
.hotel-details { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
.hotel-detail-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.hotel-detail-row:last-child { border-bottom: none; }
.hdr-label { color: var(--muted); }
.hdr-val { font-family: 'Syne Mono', monospace; color: var(--ink); }

/* ── BUDGET BREAKDOWN ── */
.budget-list { display: flex; flex-direction: column; gap: 14px; }
.budget-item {
  display: flex;
  align-items: center;
  gap: 12px;
}
.bi-icon { font-size: 14px; width: 24px; text-align: center; }
.bi-label { flex: 1; font-size: 12px; color: var(--muted); }
.bi-bar-wrap { width: 100px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.bi-bar { height: 100%; background: linear-gradient(90deg, var(--c1), var(--c2)); border-radius: 2px; transition: background var(--transition); }
.bi-amount { font-family: 'Syne Mono', monospace; font-size: 12px; color: var(--ink); min-width: 50px; text-align: right; }

/* ── HIGHLIGHTS ── */
.highlights-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.highlight-tag {
  padding: 10px 14px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 2px;
  font-size: 11px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s, border-color 0.2s;
  cursor: none;
}
.highlight-tag:hover {
  background: rgba(255,255,255,0.08);
  border-color: var(--c1);
}
.ht-emoji { font-size: 14px; }
.ht-type {
  font-family: 'Syne Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.2em;
  color: var(--c1);
  text-transform: uppercase;
  transition: color var(--transition);
}

/* ── TIPS ── */
.tips-list { display: flex; flex-direction: column; gap: 12px; }
.tip-item {
  display: flex;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  line-height: 1.6;
}
.tip-item:last-child { border-bottom: none; }
.tip-num {
  font-family: 'Syne Mono', monospace;
  font-size: 10px;
  color: var(--c1);
  min-width: 20px;
  margin-top: 2px;
  transition: color var(--transition);
}
.tip-text { color: var(--muted); }
.tip-text strong { color: var(--ink); font-weight: 600; }

/* ── PAYMENT SECTION ── */
.payment-section { margin-top: 8px; }
.payment-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.payment-title {
  font-family: 'Syne Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--c1);
  transition: color var(--transition);
}
.payment-summary {
  font-family: 'Syne Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}
.payments-list { display: flex; flex-direction: column; gap: 2px; }
.payment-row {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  transition: background 0.2s, border-color 0.2s;
}
.payment-row:hover { background: rgba(255,255,255,0.95); border-color: var(--c2); }
.pr-name { font-size: 13px; font-weight: 600; color: var(--ink); }
.pr-sub { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
.pr-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
.pr-amount { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; color: var(--ink); }
.pr-status {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 2px;
  font-weight: 500;
}
.pr-status.paid     { background: rgba(34,134,80,0.15);  color: #1f6e44; border: 1px solid rgba(34,134,80,0.3); }
.pr-status.pending  { background: rgba(180,107,9,0.15);  color: #92560a; border: 1px solid rgba(180,107,9,0.3); }
.pr-status.upcoming { background: rgba(0,0,0,0.06);      color: rgba(0,0,0,0.55); border: 1px solid rgba(0,0,0,0.12); }

/* ── PROGRESS BAR ── */
.progress-section {
  margin-top: 24px;
  padding: 24px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 4px;
}
.progress-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 12px;
  font-size: 12px;
}
.ph-label { color: var(--muted); font-family: 'Syne Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; }
.ph-pct { color: var(--c1); font-family: 'Syne Mono', monospace; font-size: 11px; transition: color var(--transition); }
.progress-track {
  height: 6px;
  background: var(--border);
  border-radius: 0;
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--c1), var(--c2), var(--c3));
  background-size: 200% 100%;
  animation: shimmer 3s ease infinite;
  transition: background var(--transition);
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.progress-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  font-family: 'Syne Mono', monospace;
  font-size: 10px;
}
.pl-paid { color: var(--c1); transition: color var(--transition); }
.pl-remaining { color: var(--muted); }

/* ── OVERVIEW TAB ── */
.overview-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 2px;
  margin-bottom: 32px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}
.overview-city-card {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 24px 20px;
  cursor: none;
  transition: background 0.2s;
  position: relative;
  overflow: hidden;
}
.overview-city-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--c1), var(--c2));
  opacity: 0;
  transition: opacity 0.3s;
}
.overview-city-card:hover::before { opacity: 0.06; }
.occ-flag { font-size: 24px; margin-bottom: 10px; position: relative; }
.occ-name {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
  position: relative;
}
.occ-nights {
  font-family: 'Syne Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
  position: relative;
}
.occ-cost {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--c1);
  transition: color var(--transition);
  position: relative;
}
.occ-dates {
  font-family: 'Syne Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  margin-top: 6px;
  position: relative;
}
.overview-totals {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  background: var(--border);
  margin-bottom: 32px;
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}
.ot-box {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 32px;
  text-align: center;
}
.ot-label {
  font-family: 'Syne Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}
.ot-val {
  font-family: 'Playfair Display', serif;
  font-size: 44px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--c1), var(--c2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  transition: background var(--transition);
  line-height: 1;
}
.ot-sub { font-size: 11px; color: var(--muted); margin-top: 8px; font-family: 'Syne Mono', monospace; }

/* ── CATEGORY BUDGETS ── */
.cat-budgets {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 2px;
  background: var(--border);
}
.cat-box {
  background: var(--bg);
  padding: 28px;
}
.cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.cat-icon { font-size: 20px; }
.cat-name { font-family: 'Syne Mono', monospace; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); }
.cat-amount { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--ink); margin-bottom: 10px; }
.cat-bar-track { height: 3px; background: var(--border); }
.cat-bar-fill { height: 100%; background: linear-gradient(90deg, var(--c1), var(--c2)); transition: background var(--transition); }
.cat-pct { font-family: 'Syne Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 6px; }

/* ── ANIMATIONS ── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
.city-panel { animation: fadeSlideUp 0.5s ease both; }
.overview-panel { animation: fadeSlideUp 0.5s ease both; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .header { padding: 20px 24px; }
  .header-trip { display: none; }
  .city-nav { padding: 0 24px; }
  .content { padding: 0 24px 40px; }
  .city-hero { grid-template-columns: 1fr; gap: 20px; }
  .city-hero-right { text-align: left; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .details-grid { grid-template-columns: 1fr; }
  .highlights-grid { grid-template-columns: 1fr; }
  .overview-grid { grid-template-columns: repeat(2, 1fr); }
  .overview-totals { grid-template-columns: 1fr; }
  .cat-budgets { grid-template-columns: 1fr; }
  .payment-row { grid-template-columns: 1fr auto; }
  .pr-date { display: none; }
}
/* ════════════════════════════════════════════════
   NEW FEATURES — Cinematic, Countdown, Map, Timeline, Dark Mode, Quick Links
   ════════════════════════════════════════════════ */

/* ── MICRO-ANIMATIONS + GLASSMORPHISM (T4) ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
.anim-in { opacity: 0; animation: fadeUp 0.6s cubic-bezier(.2,.7,.2,1) forwards; }
.stat-tile, .overview-city-card, .boarding-pass, .detail-card,
.clock-card, .weather-card, .stat-box {
  transition: transform 0.35s cubic-bezier(.2,.7,.2,1), box-shadow 0.35s, border-color 0.35s;
}
.stat-tile, .overview-city-card, .detail-card {
  position: relative;
  overflow: hidden;
}
.stat-tile::before, .overview-city-card::before, .detail-card::before {
  content: '';
  position: absolute;
  top: -50%; left: -65%;
  width: 55%; height: 200%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.13), transparent);
  transform: skewX(-20deg);
  transition: left 0.6s ease;
  pointer-events: none;
}
.stat-tile:hover::before, .overview-city-card:hover::before, .detail-card:hover::before {
  left: 145%;
}
.overview-city-card:hover, .detail-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 14px 36px rgba(0,0,0,0.14);
}
@media (prefers-reduced-motion: reduce) {
  .anim-in { opacity: 1; animation: none; }
  .stat-tile::before, .overview-city-card::before, .detail-card::before { display: none; }
}
/* On mobile, keep entry fade but disable heavy hover shimmer for performance */
@media (max-width: 768px) {
  .stat-tile::before, .overview-city-card::before, .detail-card::before { display: none; }
  .boarding-pass:hover, .overview-city-card:hover, .detail-card:hover { transform: none; box-shadow: none; }
}


/* ── CINEMATIC INTRO ── */
#intro {
  position: fixed;
  inset: 0;
  z-index: 10000;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: none;
  transition: opacity 1.2s ease, visibility 1.2s ease;
}
#intro.gone { opacity: 0; visibility: hidden; pointer-events: none; }

/* Slideshow background */
.intro-slides {
  position: absolute;
  inset: 0;
  z-index: 0;
}
.intro-slide {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  animation: slideshow 24s infinite;
}
.intro-slide:nth-child(1) { animation-delay: 0s;
  background-image: url('https://images.unsplash.com/photo-1530870110042-98b2cb110834?w=2400&q=80&auto=format&fit=crop'); }
.intro-slide:nth-child(2) { animation-delay: 4s;
  background-image: url('https://images.unsplash.com/photo-1517457373958-b7bdd4587205?w=2400&q=80&auto=format&fit=crop'); }
.intro-slide:nth-child(3) { animation-delay: 8s;
  background-image: url('https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=2400&q=80&auto=format&fit=crop'); }
.intro-slide:nth-child(4) { animation-delay: 12s;
  background-image: url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=2400&q=80&auto=format&fit=crop'); }
.intro-slide:nth-child(5) { animation-delay: 16s;
  background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=2400&q=80&auto=format&fit=crop'); }
.intro-slide:nth-child(6) { animation-delay: 20s;
  background-image: url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=2400&q=80&auto=format&fit=crop'); }
@keyframes slideshow {
  0%   { opacity: 0; transform: scale(1.0); }
  4%   { opacity: 1; transform: scale(1.05); }
  20%  { opacity: 1; transform: scale(1.10); }
  24%  { opacity: 0; transform: scale(1.12); }
  100% { opacity: 0; }
}
.intro-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.25) 40%, rgba(0,0,0,0.65) 100%),
    radial-gradient(ellipse at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 100%);
  z-index: 1;
}
.intro-content {
  position: relative;
  z-index: 2;
  text-align: center;
  color: white;
  padding: 0 24px;
}
.intro-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  margin-bottom: 24px;
  opacity: 0;
  animation: introFade 1.5s 0.3s ease forwards;
}
.intro-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(50px, 9vw, 120px);
  font-weight: 400;
  line-height: 0.95;
  letter-spacing: -0.02em;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #fff 0%, #e8d4a8 50%, #fff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0;
  animation: introFade 1.8s 0.7s ease forwards;
}
.intro-title em { font-style: italic; }
.intro-sub {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: clamp(16px, 2.2vw, 22px);
  color: rgba(255,255,255,0.85);
  margin-bottom: 40px;
  opacity: 0;
  animation: introFade 1.8s 1.1s ease forwards;
}
.intro-cities {
  display: flex;
  gap: 24px;
  justify-content: center;
  margin-bottom: 50px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.6);
  opacity: 0;
  animation: introFade 1.8s 1.5s ease forwards;
}
.intro-cities span { font-size: 20px; margin-right: 8px; }
.intro-divider {
  color: rgba(255,255,255,0.3);
}
.intro-crew {
  display: flex;
  flex-wrap: wrap;
  gap: 14px 22px;
  justify-content: center;
  align-items: flex-start;
  margin-bottom: 44px;
  opacity: 0;
  animation: introFade 1.8s 1.8s ease forwards;
}
.intro-crew .ic-member {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.intro-crew .ic-name {
  font-family: 'EB Garamond', serif;
  font-size: clamp(15px, 1.9vw, 19px);
  color: rgba(255,255,255,0.95);
  padding-bottom: 4px;
  border-bottom: 1.5px solid var(--ic, rgba(255,255,255,0.5));
}
.intro-crew .ic-role {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ic, rgba(255,255,255,0.6));
  opacity: 0.85;
}
.intro-enter {
  display: inline-block;
  padding: 16px 40px;
  border: 1.5px solid rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  color: white;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  cursor: none;
  transition: all 0.3s;
  opacity: 0;
  animation: introFade 1.8s 2.3s ease forwards, pulse-btn 2.5s 3.0s ease infinite;
}
.intro-enter:hover {
  background: white;
  color: black;
  border-color: white;
  letter-spacing: 0.5em;
}
@keyframes introFade { to { opacity: 1; } }
@keyframes pulse-btn {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
  50% { box-shadow: 0 0 0 16px rgba(255,255,255,0); }
}

/* ── DARK MODE ── */
body.dark { --bg: #0a0e1a; --ink: #f0f0f0; --muted: rgba(240,240,240,0.5); }
body.dark.theme-mykonos {
  --bg: #050d1c; --ink: #e0f0ff; --muted: rgba(224,240,255,0.5);
  --c1: #5dadec; --c2: #7ec8e3; --c3: #a8d8f0;
  --border: rgba(125,200,227,0.18); --header-bg: rgba(5,13,28,0.92);
  --orb1: #1a4a7a; --orb2: #0d3559; --orb3: #2a5a8a;
}
body.dark.theme-mallorca {
  --bg: #1a0f00; --ink: #fce8c8; --muted: rgba(252,232,200,0.5);
  --c1: #f5b84a; --c2: #fad48a; --c3: #fde9b8;
  --border: rgba(245,184,74,0.18); --header-bg: rgba(26,15,0,0.92);
  --orb1: #5a3a0a; --orb2: #4a2a05; --orb3: #6a4a1a;
}
body.dark.theme-paris {
  --bg: #0a0820; --ink: #e8e0ff; --muted: rgba(232,224,255,0.5);
  --c1: #8d7cd6; --c2: #b8a8e8; --c3: #d4c8f5;
  --border: rgba(184,168,232,0.18); --header-bg: rgba(10,8,32,0.92);
  --orb1: #2a1a5a; --orb2: #1f1245; --orb3: #3a2a6a;
}
body.dark.theme-overview, body.dark.theme-stats, body.dark.theme-assistant {
  --bg: #0e0c0a; --ink: #f0e8d0; --muted: rgba(240,232,208,0.5);
  --c1: #d4b87a; --c2: #e8d4a8; --c3: #f2e8d0;
  --border: rgba(212,184,122,0.18); --header-bg: rgba(14,12,10,0.92);
  --orb1: #4a3a1a; --orb2: #3a2a10; --orb3: #5a4a2a;
}
body.dark .detail-card,
body.dark .stat-box,
body.dark .payment-row,
body.dark .progress-section,
body.dark .overview-city-card,
body.dark .ot-box {
  background: rgba(20,20,30,0.7) !important;
  color: var(--ink);
}
body.dark .detail-card:hover,
body.dark .payment-row:hover { background: rgba(30,30,45,0.8) !important; }
body.dark .pr-name { color: var(--ink); }
body.dark .pr-amount { color: var(--ink); }
body.dark .city-bg.active { opacity: 0.32; }

/* ── HEADER ACTIONS ── */
.header-actions {
  display: flex;
  align-items: center;
  gap: 14px;
}
.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  cursor: none;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
  color: var(--ink);
}
.icon-btn:hover {
  background: var(--c1);
  color: white;
  border-color: var(--c1);
  transform: scale(1.08);
}

/* ── COUNTDOWN ── */
.countdown-section {
  margin-bottom: 32px;
  padding: 36px 32px;
  background: linear-gradient(135deg, var(--c1), var(--c2));
  background-size: cover;
  background-position: center;
  border-radius: 10px;
  color: white;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
.countdown-section.has-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(0,0,0,0.55), rgba(0,0,0,0.35)),
    radial-gradient(ellipse 120% 80% at 50% 120%, rgba(0,0,0,0.5), transparent);
  z-index: 0;
}
.countdown-section:not(.has-bg)::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 100% 60% at 50% 0%, rgba(255,255,255,0.2), transparent);
}
.countdown-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  opacity: 0.95;
  margin-bottom: 16px;
  position: relative;
  z-index: 1;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.countdown-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  position: relative;
  z-index: 1;
}
.cd-cell { padding: 12px 8px; }
.cd-num {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(36px, 6vw, 56px);
  font-weight: 400;
  line-height: 1;
  display: block;
  margin-bottom: 6px;
  text-shadow: 0 2px 16px rgba(0,0,0,0.5);
}
.cd-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  opacity: 0.85;
}
.cd-cell + .cd-cell { border-left: 1px solid rgba(255,255,255,0.2); }
.countdown-pulse {
  display: inline-block;
  width: 8px; height: 8px;
  background: white;
  border-radius: 50%;
  margin-right: 8px;
  animation: pulse 2s ease infinite;
  vertical-align: middle;
}

/* ── FLIGHT MAP ── */
.map-section {
  margin-bottom: 32px;
  padding: 28px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}
body.dark .map-section { background: rgba(20,20,30,0.7); }
.map-title {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--c1);
  margin-bottom: 20px;
}
.map-svg-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 7;
  background: linear-gradient(180deg, var(--card), transparent);
  border-radius: 4px;
  overflow: hidden;
}
.map-svg { width: 100%; height: 100%; }
.map-route {
  fill: none;
  stroke: var(--c1);
  stroke-width: 2;
  stroke-dasharray: 8 6;
  stroke-linecap: round;
  opacity: 0.5;
}
.map-route-active {
  fill: none;
  stroke: var(--c1);
  stroke-width: 2.5;
  stroke-dasharray: 1500;
  stroke-dashoffset: 1500;
  animation: drawRoute 4s ease-in-out infinite;
}
@keyframes drawRoute {
  0% { stroke-dashoffset: 1500; opacity: 0.9; }
  60% { stroke-dashoffset: 0; opacity: 0.9; }
  100% { stroke-dashoffset: 0; opacity: 0.3; }
}
.map-plane {
  font-size: 24px;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.25));
}
.map-pin {
  cursor: none;
  transition: transform 0.3s;
}
.map-pin:hover { transform: scale(1.3); }
.map-pin-dot {
  fill: var(--c1);
  stroke: white;
  stroke-width: 3;
}
.map-pin-pulse {
  fill: var(--c1);
  opacity: 0.4;
  animation: pinPulse 2s ease-in-out infinite;
}
@keyframes pinPulse {
  0% { r: 8; opacity: 0.6; }
  100% { r: 24; opacity: 0; }
}
.map-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  fill: var(--ink);
}

/* ── TIMELINE ── */
.timeline-section {
  margin-bottom: 32px;
}
.timeline-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.timeline-scroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--c2) transparent;
}
.timeline-scroll::-webkit-scrollbar { height: 6px; }
.timeline-scroll::-webkit-scrollbar-thumb { background: var(--c2); border-radius: 3px; }
.day-card {
  flex: 0 0 220px;
  padding: 20px;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: none;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
body.dark .day-card { background: rgba(20,20,30,0.7); }
.day-card:hover {
  transform: translateY(-4px);
  border-color: var(--c1);
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}
.day-card.today {
  background: linear-gradient(135deg, var(--c1), var(--c2));
  color: white;
  border-color: transparent;
}
.day-card.today .dc-num,
.day-card.today .dc-date,
.day-card.today .dc-city,
.day-card.today .dc-event { color: white !important; }
.day-card.past { opacity: 0.55; }
.dc-num {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.dc-date {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  margin-bottom: 4px;
  color: var(--ink);
}
.dc-flag { font-size: 18px; margin-bottom: 8px; display: block; }
.dc-city {
  font-family: 'EB Garamond', serif;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--ink);
}
.dc-event {
  font-size: 11px;
  color: var(--muted);
  font-style: italic;
  line-height: 1.5;
}
.dc-badge {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 9px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 3px 8px;
  background: rgba(255,255,255,0.25);
  border-radius: 2px;
  color: white;
}

/* ── QUICK LINKS ── */
.quick-links-section {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}
.quick-link {
  padding: 18px 20px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 6px;
  text-decoration: none;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: none;
  transition: all 0.2s;
  font-family: 'EB Garamond', serif;
}
body.dark .quick-link { background: rgba(20,20,30,0.7); color: var(--ink); }
.quick-link:hover {
  border-color: var(--c1);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}
.ql-icon {
  font-size: 22px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--card);
  border-radius: 50%;
  flex-shrink: 0;
}
.ql-text { flex: 1; }
.ql-title { font-size: 13px; font-weight: 600; line-height: 1.2; }
.ql-sub { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
.ql-arrow { color: var(--muted); font-size: 14px; }

@media (max-width: 768px) {
  .quick-links-section { grid-template-columns: 1fr 1fr; }
  .countdown-grid { grid-template-columns: repeat(2, 1fr); }
  .day-card { flex: 0 0 180px; }
  .header-actions .icon-btn { width: 32px; height: 32px; font-size: 14px; }
}

/* ── EXCHANGE RATE WIDGET ── */
.fx-section {
  margin-bottom: 32px;
  padding: 28px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}
body.dark .fx-section { background: rgba(20,20,30,0.7); }
.fx-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}
.fx-title {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--c1);
}
.fx-meta {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.fx-live-dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: #22c55e;
  border-radius: 50%;
  animation: pulse 2s ease infinite;
}
.fx-hero {
  text-align: center;
  padding: 14px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.fx-pair {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--muted);
  margin-bottom: 8px;
}
.fx-rate-big {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(48px, 8vw, 80px);
  font-weight: 400;
  line-height: 1;
  background: linear-gradient(135deg, var(--c1), var(--c2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.fx-rate-big .fx-suffix {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 0.4em;
  color: var(--muted);
  -webkit-text-fill-color: var(--muted);
  margin-left: 8px;
}
.fx-converter {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 16px;
  padding: 18px;
  background: var(--card);
  border-radius: 4px;
  margin-bottom: 16px;
}
.fx-input-wrap {
  position: relative;
}
.fx-currency-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.3em;
  color: var(--muted);
  margin-bottom: 6px;
  text-transform: uppercase;
}
.fx-input {
  width: 100%;
  padding: 12px 16px;
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  background: rgba(255,255,255,0.8);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
body.dark .fx-input { background: rgba(0,0,0,0.3); color: var(--ink); }
.fx-input:focus { border-color: var(--c1); }
.fx-arrow {
  font-size: 24px;
  color: var(--c1);
  cursor: none;
  transition: transform 0.3s;
}
.fx-arrow:hover { transform: rotate(180deg); }
.fx-banks {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.fx-bank-row {
  padding: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  text-align: center;
}
.fx-bank-name {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.fx-bank-rate {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--ink);
  line-height: 1;
}
.fx-bank-spread {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  margin-top: 4px;
}
.fx-disclaimer {
  font-size: 10px;
  color: var(--muted);
  font-style: italic;
  margin-top: 12px;
  text-align: center;
}
@media (max-width: 768px) {
  .fx-banks { grid-template-columns: 1fr 1fr; }
  .fx-converter { grid-template-columns: 1fr; }
  .fx-arrow { transform: rotate(90deg); }
  .fx-arrow:hover { transform: rotate(270deg); }
}

/* ── FLIGHT & HOTEL BUTTONS ── */
.flight-btn, .hotel-maps-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 13px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.05em;
  color: var(--ink);
  text-decoration: none;
  transition: all 0.2s;
  cursor: none;
}
.flight-btn:hover, .hotel-maps-btn:hover {
  background: var(--c1);
  color: white;
  border-color: var(--c1);
  transform: translateY(-1px);
}
.flight-btn span, .hotel-maps-btn span { font-size: 12px; }
.hotel-maps-btn {
  width: 100%;
  justify-content: center;
  padding: 12px;
  margin-top: 14px;
  font-size: 11px;
  letter-spacing: 0.1em;
}

/* ── BOARDING PASS (T3) ── */
.boarding-pass {
  position: relative;
  background: var(--card, rgba(255,255,255,0.06));
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 16px;
  transition: transform 0.35s cubic-bezier(.2,.7,.2,1), box-shadow 0.35s, border-color 0.35s;
}
.boarding-pass:hover {
  transform: translateY(-4px);
  border-color: var(--c1);
  box-shadow: 0 14px 40px rgba(0,0,0,0.18);
}
.bp-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px;
  border-bottom: 1px dashed var(--border);
}
.bp-route {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; padding: 20px 16px 14px;
}
.bp-endpoint { flex-shrink: 0; }
.bp-code {
  font-family: 'DM Mono', monospace;
  font-size: clamp(28px, 5vw, 36px);
  font-weight: 700; line-height: 1; color: var(--ink);
}
.bp-city { font-size: 11px; color: var(--c1); margin-top: 5px; }
.bp-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }
.bp-path { flex: 1; display: flex; align-items: center; gap: 6px; color: var(--c1); }
.bp-line {
  flex: 1; height: 1px;
  background: repeating-linear-gradient(90deg, var(--c1) 0 5px, transparent 5px 11px);
  opacity: 0.6;
}
.bp-plane { font-size: 18px; }
.bp-meta {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 6px;
  padding: 12px 16px; border-top: 1px solid var(--border);
}
.bp-meta-label {
  font-family: 'DM Mono', monospace; font-size: 8px;
  letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted);
}
.bp-meta-val { font-size: 13px; color: var(--ink); margin-top: 3px; }
.bp-stub {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  padding: 14px 16px;
  border-top: 1px dashed var(--border);
  background: rgba(0,0,0,0.04);
}
body.dark .bp-stub { background: rgba(0,0,0,0.22); }
.bp-barcode {
  flex: 1; min-width: 140px;
  display: flex; align-items: flex-end; gap: 2px; height: 40px;
}
.bp-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 13px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px;
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.05em; color: var(--ink);
  text-decoration: none; transition: all 0.2s; cursor: none;
}
.bp-btn:hover { background: var(--c1); color: #fff; border-color: var(--c1); transform: translateY(-1px); }
.bp-btn span { font-size: 12px; }
.bp-livebar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 10px 16px;
  border-bottom: 1px dashed var(--border);
}
.bp-status {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.05em; padding: 3px 10px;
  border: 1px solid; border-radius: 20px;
}
.bp-flight-cd {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--ink);
}
/* ── SPEND ANALYZER (T7) ── */
.sa-row {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 16px; border-radius: 10px;
  background: var(--card, rgba(255,255,255,0.04));
}
.sa-ic { font-size: 26px; flex-shrink: 0; line-height: 1.1; }
.sa-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.sa-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }
.sa-sub strong { color: var(--ink); }
.sa-metrics {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  margin-top: 14px;
}
.sa-metric {
  background: var(--card, rgba(255,255,255,0.04));
  border: 1px solid var(--border); border-radius: 10px;
  padding: 12px; text-align: center;
}
.sa-m-label {
  font-family: 'DM Mono', monospace; font-size: 8px;
  letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted);
  margin-bottom: 5px;
}
.sa-m-val { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--ink); }
@media (max-width: 600px) {
  .sa-metrics { grid-template-columns: repeat(2, 1fr); }
}

/* ── AI ASSISTANT (T5) ── */
.asst-wrap { max-width: 760px; margin: 0 auto; }
.asst-head {
  display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
}
.asst-avatar {
  width: 46px; height: 46px; border-radius: 13px;
  background: linear-gradient(135deg, var(--c1), var(--c2));
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.asst-thread {
  display: flex; flex-direction: column; gap: 12px;
  min-height: 220px; margin-bottom: 16px;
}
.asst-msg {
  max-width: 86%; padding: 12px 15px; font-size: 14px; line-height: 1.7;
  border-radius: 16px;
}
.asst-msg.user {
  align-self: flex-end;
  background: var(--c1); color: #fff;
  border-bottom-right-radius: 5px;
}
.asst-msg.bot {
  align-self: flex-start;
  background: var(--card, rgba(255,255,255,0.06));
  border: 1px solid var(--border); color: var(--ink);
  border-bottom-left-radius: 5px;
  white-space: pre-wrap;
}
.asst-msg.bot.error { border-color: #e2574a; color: #e2574a; }
.asst-typing { display: inline-flex; gap: 4px; align-items: center; }
.asst-typing span {
  width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
  animation: asstBlink 1.2s infinite both;
}
.asst-typing span:nth-child(2) { animation-delay: 0.2s; }
.asst-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes asstBlink { 0%,80%,100% { opacity: 0.25; } 40% { opacity: 1; } }
.asst-suggests { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.asst-chip {
  background: var(--card, rgba(255,255,255,0.06));
  border: 1px solid var(--border); color: var(--c1);
  font-size: 12px; padding: 7px 13px; border-radius: 18px;
  cursor: none; transition: all 0.2s;
}
.asst-chip:hover { background: var(--c1); color: #fff; border-color: var(--c1); }
.asst-inputbar {
  display: flex; align-items: center; gap: 10px;
  background: var(--card, rgba(255,255,255,0.06));
  border: 1px solid var(--border); border-radius: 26px;
  padding: 8px 8px 8px 18px;
}
.asst-inputbar input {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: inherit; font-size: 14px; color: var(--ink);
}
.asst-inputbar input::placeholder { color: var(--muted); }
.asst-send {
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--c1), var(--c2));
  border: none; color: #fff; font-size: 18px; cursor: none;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s;
}
.asst-send:hover { transform: scale(1.08); }
.asst-send:disabled { opacity: 0.5; transform: none; }
.asst-note {
  font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
  text-align: center; margin-top: 12px;
}

/* ── TRIP STATS ── */
.stats-panel { position: relative; }
.stats-hero-banner {
  position: relative;
  padding: 0;
  margin-bottom: 32px;
}
.stats-hero-banner .city-eyebrow { color: var(--c1); }
.stats-hero-banner .city-name-big { color: var(--ink); }
.stats-hero-banner .city-tagline { color: var(--muted); }

.stats-mega-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}
.stat-tile {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px 18px;
  text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  transition: all 0.3s;
}
body.dark .stat-tile { background: rgba(20,20,30,0.7); }
.stat-tile:hover {
  transform: translateY(-4px);
  border-color: var(--c1);
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}
.stat-tile-icon { font-size: 32px; margin-bottom: 10px; line-height: 1; }
.stat-tile-val {
  font-family: 'DM Serif Display', serif;
  font-size: 30px;
  line-height: 1;
  background: linear-gradient(135deg, var(--c1), var(--c2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.stat-tile-label {
  font-family: 'EB Garamond', serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
}
.stat-tile-sub {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  margin-top: 4px;
}
.flight-legs {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 32px;
}
body.dark .flight-legs { background: rgba(20,20,30,0.7); }
.leg-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.leg-row:last-child { border-bottom: none; }
.leg-route { font-size: 14px; color: var(--ink); }
.leg-dist { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--c1); }
.leg-total { border-top: 2px solid var(--ink); margin-top: 4px; padding-top: 14px; }
.leg-total .leg-route { font-weight: 600; }
.leg-total .leg-dist { font-family: 'DM Serif Display', serif; font-size: 18px; }
@media (max-width: 768px) {
  .stats-mega-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── EXPENSE TRACKER ── */
.expense-section {
  margin-bottom: 32px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}
body.dark .expense-section { background: rgba(20,20,30,0.7); }
.expense-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
}
.expense-title {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--c1);
}
/* Rate control */
.rate-control {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}
.rate-toggle {
  display: inline-flex;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
}
.rate-toggle button {
  padding: 6px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: none;
  border: none;
  color: var(--muted);
  cursor: none;
  transition: all 0.2s;
  white-space: nowrap;
}
.rate-toggle button.active { background: var(--c1); color: white; }
.rate-input {
  width: 64px;
  padding: 5px 8px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--ink);

/* Add form */
.expense-form {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr auto;
  gap: 10px;
  align-items: end;
  margin-bottom: 20px;
  padding: 18px;
  background: var(--card);
  border-radius: 10px;
}
.ef-field { display: flex; flex-direction: column; gap: 5px; }
.ef-label {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}
.ef-input, .ef-select {
  padding: 9px 11px;
  font-family: 'EB Garamond', serif;
  font-size: 14px;
  background: rgba(255,255,255,0.7);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--ink);
  outline: none;
}
body.dark .ef-input, body.dark .ef-select { background: rgba(0,0,0,0.3); color: var(--ink); }
.ef-input:focus, .ef-select:focus { border-color: var(--c1); }
.ef-add-btn {
  padding: 10px 18px;
  background: linear-gradient(135deg, var(--c1), var(--c2));
  border: none;
  border-radius: 8px;
  color: white;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: none;
  transition: all 0.2s;
  white-space: nowrap;
}
.ef-add-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.15); }
/* Expense list */
.expense-list { display: flex; flex-direction: column; gap: 2px; }
.expense-row {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto auto;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  transition: background 0.15s;
}
.expense-row:hover { background: rgba(0,0,0,0.04); }
body.dark .expense-row:hover { background: rgba(255,255,255,0.05); }

if (isTouchDevice) {
  // Hide custom cursor, restore normal touch behavior
  if (cursor) cursor.style.display = 'none';
  if (cursorRing) cursorRing.style.display = 'none';
  document.body.style.cursor = 'auto';
} else {
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
  });
  function animateCursor() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    cursorRing.style.left = rx + 'px';
    cursorRing.style.top = ry + 'px';
    requestAnimationFrame(animateCursor);
  }
  animateCursor();
}

// ── COUNTDOWN ──
function getCountdown(target) {
  const diff = target - new Date();
  if (diff <= 0) return null;
  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff / (1000*60*60)) % 24);
  const m = Math.floor((diff / (1000*60)) % 60);
  const s = Math.floor((diff / 1000) % 60);
  return { d, h, m, s };
}

function renderCountdown(target, eyebrow, bgImage) {
  const c = getCountdown(target);
  const bgStyle = bgImage ? ` style="background-image:url('${bgImage}')"` : '';
  const bgClass = bgImage ? ' has-bg' : '';
  if (!c) return `
    <div class="countdown-section${bgClass}"${bgStyle}>

      <div style="font-family:'DM Serif Display',serif;font-size:32px;position:relative;z-index:1">✈️ Already there!</div>

function updateClocks() {
  cityGeo.forEach(c => {
    const now = new Date();
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: c.tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
    }).formatToParts(now);
    const h = +parts.find(p=>p.type==='hour').value % 12;
    const m = +parts.find(p=>p.type==='minute').value;
    const s = +parts.find(p=>p.type==='second').value;
    const digital = new Intl.DateTimeFormat('en-GB', { timeZone:c.tz, hour:'2-digit', minute:'2-digit', hour12:false }).format(now);

    const hourDeg = (h * 30) + (m * 0.5);
    const minDeg = m * 6;
    const secDeg = s * 6;

    document.querySelectorAll(`[data-city="${c.key}"][data-hand="hour"]`).forEach(el=>el.style.transform=`rotate(${hourDeg}deg)`);
    document.querySelectorAll(`[data-city="${c.key}"][data-hand="min"]`).forEach(el=>el.style.transform=`rotate(${minDeg}deg)`);
    document.querySelectorAll(`[data-city="${c.key}"][data-hand="sec"]`).forEach(el=>el.style.transform=`rotate(${secDeg}deg)`);

    const dig = document.getElementById(`digital-${c.key}`);
    if(dig) dig.textContent = digital;
  });
}

async function loadCityWeather(cityKey) {
  const riyadh = cityGeo.find(c=>c.key==='riyadh');
  const city = cityGeo.find(c=>c.key===cityKey);
  if (!city) return;
  const pair = [city, riyadh];
  for (const c of pair) {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=${encodeURIComponent(c.tz)}&forecast_days=1`;
      const r = await fetch(url);
      if (!r.ok) throw new Error('weather fetch failed');
      const d = await r.json();
      const temp = Math.round(d.current.temperature_2m);
      const code = d.current.weather_code;
      const wc = weatherCodes[code] || {i:'🌡️',t:'—'};
      const hi = Math.round(d.daily.temperature_2m_max[0]);
      const lo = Math.round(d.daily.temperature_2m_min[0]);
      const sunrise = d.daily.sunrise[0].split('T')[1];
      const sunset = d.daily.sunset[0].split('T')[1];

      const iconEl = document.getElementById(`wx-icon-${c.key}`);
      const tempEl = document.getElementById(`wx-temp-${c.key}`);
      const descEl = document.getElementById(`wx-desc-${c.key}`);
      const hiloEl = document.getElementById(`wx-hilo-${c.key}`);
      const sunEl  = document.getElementById(`wx-sun-${c.key}`);
      if(iconEl) iconEl.textContent = wc.i;
      if(tempEl) tempEl.textContent = `${temp}°C`;
      if(descEl) descEl.textContent = wc.t;
      if(hiloEl) hiloEl.innerHTML = `<span class="wx-hi">▲ ${hi}°</span> &nbsp; <span class="wx-lo">▼ ${lo}°</span>`;
      if(sunEl)  sunEl.innerHTML = `🌅 ${sunrise} &nbsp;·&nbsp; 🌇 ${sunset}`;
    } catch(e) {
      const descEl = document.getElementById(`wx-desc-${c.key}`);
      const iconEl = document.getElementById(`wx-icon-${c.key}`);
      if(iconEl) iconEl.textContent = '🌡️';
      if(descEl) descEl.textContent = 'Unavailable';
    }
  }
}

let cachedRate = null;
async function fetchExchangeRate() {
  try {
    // Try Frankfurter API first
    const r = await fetch('https://api.frankfurter.dev/v1/latest?from=EUR&to=SAR');
    if (r.ok) {
      const d = await r.json();
      if (d.rates && d.rates.SAR) {
        cachedRate = d.rates.SAR;
        return cachedRate;
      }
    }
  } catch(e) {}
  // Fallback: Fawaz Ahmed API
  try {
    const r = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/eur.json');
    if (r.ok) {
      const d = await r.json();
      if (d.eur && d.eur.sar) {
        cachedRate = d.eur.sar;
        return cachedRate;
      }
    }
  } catch(e) {}
  return null;
}

async function activateExchangeWidget() {
  const fx = document.getElementById('fxSection');
  if (!fx) return;
  const rate = await fetchExchangeRate();
  if (!rate) {
    document.getElementById('fxUpdated').textContent = 'Offline · using fallback';
    document.getElementById('fxMidRate').textContent = '4.50';
    return;
  }
  const mid = rate;
  document.getElementById('fxMidRate').textContent = mid.toFixed(4);
  document.getElementById('fxUpdated').textContent = `Live · ${new Date().toLocaleDateString()}`;

  // Bank rates with realistic spreads
  const banks = document.querySelectorAll('#fxBanks .fx-bank-rate');
  const spreads = [0.018, 0.015, 0.012, 0.020]; // Al Rajhi, Barq, D360, SNB
  banks.forEach((el, i) => {
    el.textContent = (mid * (1 + spreads[i])).toFixed(4);
  });

  // Converter
  const eurInput = document.getElementById('fxEurInput');
  const sarInput = document.getElementById('fxSarInput');
  let direction = 'eur-to-sar';
  function recalc() {
    if (direction === 'eur-to-sar') {
      sarInput.value = (parseFloat(eurInput.value || 0) * mid).toFixed(2);
    } else {
      eurInput.value = (parseFloat(sarInput.value || 0) / mid).toFixed(2);
    }
  }
  recalc();
  eurInput.addEventListener('input', () => { direction = 'eur-to-sar'; recalc(); });
  sarInput.addEventListener('input', () => { direction = 'sar-to-eur'; recalc(); });
  document.getElementById('fxFlip').addEventListener('click', () => {
    const tmp = eurInput.value;
    eurInput.value = sarInput.value;
    sarInput.value = tmp;
    direction = direction === 'eur-to-sar' ? 'sar-to-eur' : 'eur-to-sar';
    recalc();
  });
}

// ── FLIGHT CARD ──
function flightCard(f, label) {
  // Parse "City (XXX)" or "City XXX" → { code, city }
  function parseEndpoint(s) {
    if (!s) return { code: '', city: '' };
    let m = s.match(/^(.*?)\s*\(([A-Z]{3})\)\s*$/);
    if (m) return { city: m[1].trim(), code: m[2] };
    m = s.match(/^(.*?)\s+([A-Z]{3})\s*$/);
    if (m) return { city: m[1].trim(), code: m[2] };
    return { city: s.trim(), code: s.trim().slice(0,3).toUpperCase() };
  }
  const a = parseEndpoint(f.dep);
  const b = parseEndpoint(f.arr);

  // T6: known departure/arrival datetimes per flight (for live status + countdown).
  // No external API — computed from the trip schedule.
  const FLIGHT_TIMES = {
    SV199:  { dep:'2026-08-11T12:00:00+03:00', arr:'2026-08-11T16:00:00+03:00' },
    EW2661: { dep:'2026-08-15T10:15:00+03:00', arr:'2026-08-15T12:05:00+02:00' },
    EW2586: { dep:'2026-08-15T14:15:00+02:00', arr:'2026-08-15T16:15:00+02:00' },
    IB5671: { dep:'2026-08-22T09:05:00+02:00', arr:'2026-08-22T11:10:00+02:00' },
    SV144:  { dep:'2026-08-27T11:30:00+02:00', arr:'2026-08-27T18:45:00+03:00' },
  };
  const ft = FLIGHT_TIMES[f.flight];
  let statusBadgeHtml = '';
  let countdownHtml = '';
  if (ft) {
    const now = new Date();
    const dep = new Date(ft.dep);
    const arr = new Date(ft.arr);
    let color, icon, txt;
    if (now < dep) {
      // Upcoming — show live countdown
      const diff = dep - now;
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff / 3600000) % 24);
      const m = Math.floor((diff / 60000) % 60);
      color = 'var(--c1)'; icon = '🔜'; txt = 'Upcoming';
      const parts = [];
      if (d > 0) parts.push(d + 'd');
      parts.push(h + 'h');
      if (d === 0) parts.push(m + 'm');
      countdownHtml = `<span class="bp-flight-cd" data-dep="${ft.dep}">Departs in ${parts.join(' ')}</span>`;
    } else if (now >= dep && now < arr) {
      color = '#16a34a'; icon = '✈️'; txt = 'In the air';
    } else {
      color = 'var(--muted)'; icon = '✅'; txt = 'Landed';
    }
    statusBadgeHtml = `<span class="bp-status" style="color:${color};border-color:${color}">${icon} ${txt}</span>`;
  }

  const transitHtml = f.transit ? `
    <div style="margin:0 16px 14px;padding:8px 12px;background:var(--border);border-radius:6px;font-size:11px;">
      <span style="color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;">Transit · ${f.transit.from || ''}</span><br>
      ${f.transit.layover ? `Layover: <strong>${f.transit.layover}</strong> · Next: ${f.transit.nextFlight} dep ${f.transit.nextDep} → arr ${f.transit.nextArr}` : f.transit.note || ''}
    </div>` : '';

  const btns = `
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${f.radar ? `<a href="${f.radar}" target="_blank" class="bp-btn"><span>✈️</span> Track ${f.flight} live</a>` : ''}
      ${f.airportMaps ? `<a href="${f.airportMaps}" target="_blank" class="bp-btn"><span>📍</span> ${f.airportName || 'Airport'}</a>` : ''}
    </div>`;

  // Barcode: deterministic bar pattern from the flight number
  let seed = 0; for (const ch of (f.flight||'XX')) seed += ch.charCodeAt(0);
  let bars = '';
  for (let i = 0; i < 26; i++) {
    seed = (seed * 9301 + 49297) % 233280;
    const w = 2 + (seed % 5);
    const h = 60 + (seed % 41);
    bars += `<div style="width:${w}px;height:${h}%;background:var(--ink);opacity:0.85"></div>`;
  }

  return `
    <div class="boarding-pass">
      <div class="bp-header">
        <div style="display:flex;align-items:center;gap:7px;color:var(--c1)">
          <span style="font-size:15px">🛫</span>
          <span style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--ink)">Boarding Pass</span>
        </div>
        <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)">${label} · ${f.date}</span>
      </div>

      ${statusBadgeHtml || countdownHtml ? `<div class="bp-livebar">${statusBadgeHtml}${countdownHtml}</div>` : ''}

      <div class="bp-route">
        <div class="bp-endpoint">
          <div class="bp-code">${a.code}</div>
          <div class="bp-city">${a.city}</div>
          <div class="bp-time">${f.depTime}</div>
        </div>
        <div class="bp-path">
          <span class="bp-line"></span>
          <span class="bp-plane">✈</span>
          <span class="bp-line"></span>
        </div>
        <div class="bp-endpoint" style="text-align:right">
          <div class="bp-code">${b.code}</div>
          <div class="bp-city">${b.city}</div>
          <div class="bp-time">${f.arrTime}</div>
        </div>
      </div>

      <div class="bp-meta">
        <div><div class="bp-meta-label">Airline</div><div class="bp-meta-val">${f.airline}</div></div>
        <div><div class="bp-meta-label">Flight</div><div class="bp-meta-val">${f.flight}</div></div>
        <div><div class="bp-meta-label">Date</div><div class="bp-meta-val">${f.date}</div></div>
      </div>

      ${transitHtml}

      <div class="bp-stub">
        <div class="bp-barcode">${bars}</div>
        ${btns}
      </div>
    </div>`;
}

// Fetch all expenses from Supabase
async function fetchExpensesFromCloud() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/expenses?select=*&order=created_at.desc`, {
      headers: SB_HEADERS,
    });
    if (!r.ok) throw new Error('fetch failed: ' + r.status);
    const data = await r.json();
    expensesCache = data.map(e => {
      let cat = e.category;
      // Auto-classify if category is 'auto' (from Barq shortcut) — use description (merchant name)
      if (cat === 'auto' || !cat) {
        cat = classifyMerchant(e.description);
      }
      return {
        id: e.id,
        desc: e.description,
        amount: parseFloat(e.amount),
        currency: e.currency,
        cat: cat,
        city: e.city,
        payer: e.payer,
        rate: parseFloat(e.rate),
        source: e.source || 'manual',
        ts: e.created_at,
      };
    });
    return expensesCache;
  } catch(e) {
    console.error('Could not load expenses from cloud:', e);
    return expensesCache; // fall back to last known
  }
}

async function addExpense() {
  const descEl = document.getElementById('expDesc');
  const amountEl = document.getElementById('expAmount');
  const desc = descEl.value.trim();
  const amount = parseFloat(amountEl.value);
  const currency = document.getElementById('expCurrency').value;
  const cat = document.getElementById('expCat').value;
  const city = document.getElementById('expCity').value;
  const payer = document.getElementById('expPayer').value;
  if (!desc || !amount || amount <= 0) {
    descEl.style.borderColor = !desc ? '#dc2626' : '';
    amountEl.style.borderColor = (!amount||amount<=0) ? '#dc2626' : '';
    return;
  }
  const rate = getExpRate();
  const addBtn = document.querySelector('.ef-add-btn');
  if (addBtn) { addBtn.textContent = '...'; addBtn.style.opacity = '0.6'; }

  const payload = {
    description: desc,
    amount: amount,
    currency: currency,
    category: cat,
    city: city,
    payer: payer,
    rate: currency === 'EUR' ? rate : 1,
    source: 'manual',
  };

  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/expenses`, {
      method: 'POST',
      headers: { ...SB_HEADERS, 'Prefer': 'return=minimal' },
      body: JSON.stringify(payload),
    });
    if (!r.ok) throw new Error('insert failed: ' + r.status);
    // Clear form
    descEl.value = '';
    amountEl.value = '';
    descEl.style.borderColor = '';
    amountEl.style.borderColor = '';
    // Reload from cloud
    await fetchExpensesFromCloud();
    refreshExpenses();
  } catch(e) {
    console.error('Could not add expense:', e);
    alert('Could not save expense. Check your connection and try again.');
  } finally {
    if (addBtn) { addBtn.textContent = '+ Add'; addBtn.style.opacity = '1'; }
  }
}

async function deleteExpense(id) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/expenses?id=eq.${id}`, {
      method: 'DELETE',
      headers: SB_HEADERS,
    });
    if (!r.ok) throw new Error('delete failed: ' + r.status);
    await fetchExpensesFromCloud();
    refreshExpenses();
  } catch(e) {
    console.error('Could not delete expense:', e);
    alert('Could not delete. Check your connection and try again.');
  }
}

// ── SPEND ANALYZER (T7) ──
// Pure analysis of your live spending pace vs. remaining budget. No external data.
function computeSpendStats() {
  const arr = (typeof getExpenses === 'function') ? getExpenses() : (expensesCache || []);
  const liveSAR = arr.reduce((s,e)=> s + expToSAR(e), 0);
  const netRemaining = overviewData.netRemaining - liveSAR;

  const now = new Date();
  const start = tripDates.start;
  const end = tripDates.end;
  const msDay = 86400000;
  const totalDays = Math.max(1, Math.round((end - start) / msDay));

  let phase, daysElapsed, daysLeft;
  if (now < start) {
    phase = 'before';
    daysElapsed = 0;
    daysLeft = totalDays;
  } else if (now > end) {
    phase = 'after';
    daysElapsed = totalDays;
    daysLeft = 0;
  } else {
    phase = 'during';
    daysElapsed = Math.max(1, Math.ceil((now - start) / msDay));
    daysLeft = Math.max(0, totalDays - daysElapsed);
  }

  const hasExpenses = arr.length > 0;
  // Daily burn rate (only meaningful once the trip started and there are expenses)
  const dailyRate = (phase === 'during' && hasExpenses) ? liveSAR / daysElapsed : 0;
  // Planned safe daily budget for remaining days
  const safeDaily = daysLeft > 0 ? netRemaining / daysLeft : 0;
  // Projected total live spend by trip end at current rate
  const projectedTotal = dailyRate * totalDays;
  // Will the money last? days the remaining budget covers at current rate
  const daysCovered = dailyRate > 0 ? netRemaining / dailyRate : Infinity;

  return { liveSAR, netRemaining, phase, totalDays, daysElapsed, daysLeft,
           hasExpenses, dailyRate, safeDaily, projectedTotal, daysCovered, count: arr.length };
}

function spendAnalyzerInner() {
  const s = computeSpendStats();
  const fmt = n => 'SAR ' + Math.round(n).toLocaleString();

  // Before the trip, or no expenses yet → friendly placeholder
  if (s.phase === 'before') {
    return `<div class="sa-row"><span class="sa-ic">🧭</span>
      <div><div class="sa-title">Ready when you are</div>
      <div class="sa-sub">Your safe daily budget is <strong>${fmt(s.netRemaining / s.totalDays)}/day</strong> for the group across ${s.totalDays} days. Live tracking kicks in once the trip starts.</div></div></div>`;
  }
  if (!s.hasExpenses) {
    return `<div class="sa-row"><span class="sa-ic">💸</span>
      <div><div class="sa-title">No live expenses yet</div>
      <div class="sa-sub">Add expenses in the tracker above and I'll project your spending pace and tell you if the budget will last.</div></div></div>`;
  }

  // Determine health: compare current daily rate to safe daily
  let statusColor, statusIcon, statusText, advice;
  if (s.phase === 'after') {
    statusColor = 'var(--muted)'; statusIcon = '🏁';
    statusText = 'Trip complete';
    advice = `You spent ${fmt(s.liveSAR)} in live expenses. Net remaining: <strong>${fmt(s.netRemaining)}</strong>.`;
  } else if (s.dailyRate <= s.safeDaily) {
    statusColor = '#16a34a'; statusIcon = '✅';
    statusText = 'On track';
    advice = `At your current pace (<strong>${fmt(s.dailyRate)}/day</strong>) the budget comfortably lasts all ${s.daysLeft} remaining days. Safe daily: ${fmt(s.safeDaily)}.`;
  } else {
    statusColor = '#dc2626'; statusIcon = '⚠️';
    statusText = 'Spending fast';
    const overPct = Math.round((s.dailyRate / s.safeDaily - 1) * 100);
    const runOut = isFinite(s.daysCovered) ? Math.floor(s.daysCovered) : null;
    advice = `You're spending <strong>${overPct}% above</strong> the safe daily pace. At ${fmt(s.dailyRate)}/day, the remaining budget lasts about <strong>${runOut} more day${runOut===1?'':'s'}</strong> of ${s.daysLeft}. Consider trimming ~${fmt(s.dailyRate - s.safeDaily)}/day.`;
  }

  const bars = `
    <div class="sa-metrics">
      <div class="sa-metric"><div class="sa-m-label">Live spent</div><div class="sa-m-val">${fmt(s.liveSAR)}</div></div>
      <div class="sa-metric"><div class="sa-m-label">Daily pace</div><div class="sa-m-val">${fmt(s.dailyRate)}</div></div>
      <div class="sa-metric"><div class="sa-m-label">Safe / day</div><div class="sa-m-val">${fmt(s.safeDaily)}</div></div>
      <div class="sa-metric"><div class="sa-m-label">Days left</div><div class="sa-m-val">${s.daysLeft}</div></div>
    </div>`;

  return `
    <div class="sa-row" style="border-left:4px solid ${statusColor}">
      <span class="sa-ic">${statusIcon}</span>
      <div>
        <div class="sa-title" style="color:${statusColor}">${statusText}</div>
        <div class="sa-sub">${advice}</div>
      </div>
    </div>
    ${bars}`;
}

  // Per-city detail
  Object.values(cities).forEach(c => {
    const paid = c.costs.reduce((s,x)=>s+x.amount,0);
    lines.push(`\n[${c.name}] ${c.dates}, ${c.nights} nights. Hotel: ${c.hotel.name}. City costs total SAR ${Math.round(paid).toLocaleString()}.`);
    if (c.flightIn)  lines.push(`  Flight in: ${c.flightIn.airline} ${c.flightIn.flight} ${c.flightIn.dep} ${c.flightIn.depTime} → ${c.flightIn.arr} ${c.flightIn.arrTime} (${c.flightIn.date}).`);

    if (c.activities) {
      const acts = c.activities.flatMap(d => d.items).filter(i => i.name);
      if (acts.length) {
        lines.push('  Activities: ' + acts.map(a => `${a.name}${a.status?` (${a.status})`:''}`).join(', ') + '.');

  // Recent live expenses (last 8) for detail questions
  const recent = (expensesCache || []).slice(0, 8);

    'اقترح لي برنامج بكرة في باريس',
    'ملخص مصاريف ميكونوس',
  ];
  const chips = suggestions.map(s =>
    `<button class="asst-chip" onclick="assistantAsk(this.textContent)">${s}</button>`
  ).join('');

  // Re-render any existing history (so switching pages keeps the chat)
  const history = assistantHistory.map(m =>
    `<div class="asst-msg ${m.role === 'user' ? 'user' : 'bot'}">${escapeHtml(m.content)}</div>`
  ).join('');

  return `<div class="asst-wrap">
    <div class="asst-head">
      <div class="asst-avatar">✨</div>
      <div>
        <div style="font-family:'DM Serif Display',serif;font-size:24px;color:var(--ink)">Trip Assistant</div>
        <div style="font-size:12px;color:var(--c1);display:flex;align-items:center;gap:6px"><span class="live-dot"></span>knows your whole trip · يفهم رحلتكم</div>
      </div>
    </div>

    <div class="asst-thread" id="asstThread">
      ${history || `<div class="asst-msg bot">أهلًا 👋 أنا مساعد رحلتكم. اسألني عن الميزانية، المصاريف، الأنشطة، الطقس، أو أي تفصيل في الرحلة — بالعربي أو English.</div>`}
    </div>

    <div class="asst-suggests">${chips}</div>

    <div class="asst-inputbar">
      <input id="asstInput" type="text" placeholder="اسأل عن أي شي في رحلتكم..." onkeydown="if(event.key==='Enter')assistantSend()" />
      <button class="asst-send" id="asstSend" onclick="assistantSend()">↑</button>
    </div>
    <div class="asst-note">Powered by Claude · answers based only on your trip data</div>
  </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function assistantSend() {
  const input = document.getElementById('asstInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  assistantAsk(text);
}

async function assistantAsk(text) {
  if (assistantBusy) return;
  const thread = document.getElementById('asstThread');
  if (!thread) return;
  assistantBusy = true;
  const sendBtn = document.getElementById('asstSend');
  if (sendBtn) sendBtn.disabled = true;

  // Append user message
  assistantHistory.push({ role: 'user', content: text });
  thread.insertAdjacentHTML('beforeend', `<div class="asst-msg user">${escapeHtml(text)}</div>`);

  // Typing indicator
  const typing = document.createElement('div');
  typing.className = 'asst-msg bot';
  typing.innerHTML = '<span class="asst-typing"><span></span><span></span><span></span></span>';
  thread.appendChild(typing);
  thread.scrollIntoView({ block: 'end' });
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

  try {
    const resp = await fetch(ASSIST_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tripContext: buildTripContext(),
        messages: assistantHistory.map(m => ({ role: m.role, content: m.content })),
      }),
    });
    const data = await resp.json();
    typing.remove();

    if (!resp.ok) {
      const msg = data && data.error ? data.error : 'حدث خطأ. حاول مرة ثانية.';
      thread.insertAdjacentHTML('beforeend', `<div class="asst-msg bot error">${escapeHtml(msg)}</div>`);
    } else {
      const reply = data.reply || '…';
      assistantHistory.push({ role: 'assistant', content: reply });
      thread.insertAdjacentHTML('beforeend', `<div class="asst-msg bot">${escapeHtml(reply)}</div>`);
    }
  } catch (err) {
    typing.remove();
    thread.insertAdjacentHTML('beforeend', `<div class="asst-msg bot error">ما قدرت أتصل بالمساعد. تأكد من الاتصال وحاول مرة ثانية.</div>`);
  } finally {
    assistantBusy = false;
    if (sendBtn) sendBtn.disabled = false;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }
}
