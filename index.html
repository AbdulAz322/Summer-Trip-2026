// ── MICRO-ANIMATIONS (T4) ──
const REDUCED_MOTION = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// Staggered fade-up for cards, then animate any number counters inside.
function applyEntryAnimations(container) {
  if (REDUCED_MOTION) { animateCounters(container); return; }
  const cards = container.querySelectorAll(
    '.stat-tile, .overview-city-card, .boarding-pass, .detail-card, .overview-totals .ot-box'
  );
  cards.forEach((el, i) => {
    el.classList.add('anim-in');
    el.style.animationDelay = Math.min(i * 60, 600) + 'ms';
  });
  setTimeout(() => animateCounters(container), 150);
}

// Animate elements that carry data-count="<number>" from 0 to target.
function animateCounters(container) {
  const els = container.querySelectorAll('[data-count]');
  els.forEach(el => {
    const target = parseFloat(el.getAttribute('data-count'));
    if (isNaN(target)) return;
    const prefix = el.getAttribute('data-count-prefix') || '';
    const suffix = el.getAttribute('data-count-suffix') || '';
    if (REDUCED_MOTION) { el.textContent = prefix + Math.round(target).toLocaleString() + suffix; return; }
    const dur = 1100;
    const start = performance.now();
    function tick(now) {
      const p = Math.min((now - start) / dur, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = prefix + Math.round(target * eased).toLocaleString() + suffix;
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

// ── SWITCH ──
function switchCity(key) {
  currentCity = key;
  document.querySelectorAll('.city-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.city === key);
  });
  // Apply theme
  document.body.className = `theme-${key}`;
  // Preserve dark mode
  if (localStorage.getItem('darkMode') !== 'false') document.body.classList.add('dark');
  // Activate matching background image
  document.querySelectorAll('.city-bg').forEach(bg => {
    bg.classList.toggle('active', bg.id === `bg-${key}`);
  });
  // Update header flag and text
  const headerFlag = document.getElementById('headerFlag');
  const headerText = document.getElementById('headerTripText');
  if (key === 'overview') {
    headerFlag.textContent = '🇬🇷🇪🇸🇫🇷';
    headerFlag.style.fontSize = '16px';
    headerText.textContent = 'Summer Trip 2026 — Greece · Spain · France';
  } else if (key === 'stats') {
    headerFlag.textContent = '📊';
    headerFlag.style.fontSize = '22px';
    headerText.textContent = 'Trip Stats — By the Numbers';
  } else if (key === 'assistant') {
    headerFlag.textContent = '✨';
    headerFlag.style.fontSize = '22px';
    headerText.textContent = 'Trip Assistant — Ask anything';
  } else {
    const c = cities[key];
    headerFlag.textContent = c.flag;
    headerFlag.style.fontSize = '24px';
    headerText.textContent = `${c.name}, ${c.country}`;
  }
  const content = document.getElementById('mainContent');
  content.innerHTML = key === 'overview' ? renderOverview()
                    : key === 'stats' ? renderStats()
                    : key === 'assistant' ? renderAssistant()
                    : renderCity(key);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  applyEntryAnimations(content);

  // Keep live expense data fresh for the assistant's context too
  if (key === 'assistant') {
    setTimeout(() => {
      const inp = document.getElementById('asstInput');
      if (inp) inp.focus();
      fetchExpensesFromCloud().catch(()=>{});
    }, 100);
  }

  // Init dynamic widgets if on overview
  if (key === 'overview') {
    setTimeout(() => {
      activateExchangeWidget();
      // Show cached immediately, then refresh from cloud
      refreshExpenses();
      fetchExpensesFromCloud().then(() => refreshExpenses());
      startExpensePolling();
    }, 100);
  } else {
    stopExpensePolling();
  }
  // Init clocks + weather on city pages
  if (key === 'mykonos' || key === 'mallorca' || key === 'paris') {
    setTimeout(() => {
      updateClocks();
      loadCityWeather(key);
    }, 100);
  }
}

// ── REALTIME POLLING (auto-refresh expenses for all members) ──
let expensePollTimer = null;
function startExpensePolling() {
  stopExpensePolling();
  expensePollTimer = setInterval(async () => {
    // Only poll when overview is visible and tab is active
    if (document.hidden) return;
    const before = expensesCache.length;
    const beforeJson = JSON.stringify(expensesCache.map(e=>e.id));
    await fetchExpensesFromCloud();
    const afterJson = JSON.stringify(expensesCache.map(e=>e.id));
    if (beforeJson !== afterJson) {
      refreshExpenses(); // something changed (added/deleted by anyone)
    }
  }, 8000); // every 8 seconds
}
function stopExpensePolling() {
  if (expensePollTimer) { clearInterval(expensePollTimer); expensePollTimer = null; }
}

// ── INIT ──
document.getElementById('cityNav').addEventListener('click', e => {
  const btn = e.target.closest('.city-btn');
  if (btn) switchCity(btn.dataset.city);
});

// ── CINEMATIC INTRO ──
const intro = document.getElementById('intro');
const introBtn = document.getElementById('introEnter');
function dismissIntro() {
  intro.classList.add('gone');
  switchCity('overview');
  setTimeout(() => intro.remove(), 1200);
}
introBtn.addEventListener('click', dismissIntro);

// ── DARK MODE ──
const darkToggle = document.getElementById('darkToggle');
const isDark = localStorage.getItem('darkMode') !== 'false';
if (isDark) { document.body.classList.add('dark'); darkToggle.textContent = '☀️'; }
else { darkToggle.textContent = '🌙'; }
darkToggle.addEventListener('click', () => {
  document.body.classList.toggle('dark');
  const dark = document.body.classList.contains('dark');
  darkToggle.textContent = dark ? '☀️' : '🌙';
  try { localStorage.setItem('darkMode', dark); } catch(e) {}
});

// ── LIVE COUNTDOWN UPDATER ──
function updateCountdowns() {
  const sections = document.querySelectorAll('.countdown-section');
  if (!sections.length) return;
  const target = currentCity === 'overview' ? tripDates.start : tripDates[currentCity];
  const c = getCountdown(target);
  if (!c) return;
  sections.forEach(sec => {
    const cells = sec.querySelectorAll('.cd-num');
    if (cells.length === 4) {
      cells[0].textContent = c.d;
      cells[1].textContent = String(c.h).padStart(2,'0');
      cells[2].textContent = String(c.m).padStart(2,'0');
      cells[3].textContent = String(c.s).padStart(2,'0');
    }
  });
}
// T6: live-update the "Departs in …" text inside boarding passes
function updateFlightCountdowns() {
  const els = document.querySelectorAll('.bp-flight-cd[data-dep]');
  if (!els.length) return;
  const now = new Date();
  els.forEach(el => {
    const dep = new Date(el.getAttribute('data-dep'));
    const diff = dep - now;
    if (diff <= 0) { el.textContent = 'Departing now'; return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff / 3600000) % 24);
    const m = Math.floor((diff / 60000) % 60);
    const parts = [];
    if (d > 0) parts.push(d + 'd');
    parts.push(h + 'h');
    if (d === 0) parts.push(m + 'm');
    el.textContent = 'Departs in ' + parts.join(' ');
  });
}

setInterval(() => { updateCountdowns(); updateClocks(); updateFlightCountdowns(); }, 1000);

switchCity('overview');
document.body.classList.add('theme-overview');
</script>
